<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AgentDockControl 控制台</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ─── 侧边栏（桌面端） ─── -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">&#x25A0;</span>
      <span class="logo-text">AgentDockControl</span>
    </div>
    <div class="connection-indicator">
      <span class="dot" id="conn-dot"></span>
      <span id="conn-text">未连接</span>
    </div>
    <nav class="nav-list" id="nav-list">
      <a href="#" data-page="sessions" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        会话
      </a>
      <a href="#" data-page="pairing" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        配对
      </a>
      <a href="#" data-page="machines" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        机器
      </a>
      <a href="#" data-page="insights" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        统计
      </a>
      <a href="#" data-page="tasks" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        任务
      </a>
      <a href="#" data-page="settings" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </a>
    </nav>
    <div class="sidebar-version">v0.1.0</div>
  </aside>

  <!-- ─── 会话列表面板（桌面端左侧） ─── -->
  <div id="session-panel" class="session-panel">
    <div class="panel-header">
      <h2>会话</h2>
      <button class="btn btn-primary btn-sm" id="btn-new-session">+ 新建</button>
      <button class="btn-icon" id="btn-refresh" title="刷新">&#x21BB;</button>
      <span class="spacer"></span>
      <span class="badge" id="session-count">0</span>
    </div>
    <div class="session-search">
      <input type="text" id="session-search" class="search-input" placeholder="搜索会话...">
    </div>
    <div class="session-category">
      <div class="category-label active" id="cat-active">活跃</div>
      <div class="category-label" id="cat-recent">最近</div>
    </div>
    <div class="session-items" id="session-items">
      <div class="empty-state">暂无会话</div>
    </div>
  </div>

  <!-- ─── 主内容区 ─── -->
  <main id="main" class="main-area">

    <!-- 配对页 -->
    <section id="page-pairing" class="page">
      <div class="page-inner narrow">
        <h1 class="page-title">连接终端</h1>
        <p class="page-desc">在终端运行以下命令，然后输入配对码。</p>
        <div class="pairing-card glass">
          <div class="pairing-code-block">
            <code>npm install && node bin/cli.js</code>
            <button class="btn-copy" onclick="window.copyText('npm install && node bin/cli.js')">&#x1F4CB;</button>
          </div>
          <div class="pairing-divider"><span>或者</span></div>
          <div class="pairing-pin-box">
            <label>终端显示的配对码</label>
            <div class="pin-row">
              <input type="text" id="pin-input" class="pin-input" placeholder="000000" maxlength="6" inputmode="numeric">
              <button id="btn-pair" class="btn btn-primary" disabled>连接</button>
            </div>
            <p id="pair-status" class="pair-status"></p>
          </div>
          <details class="pairing-advanced">
            <summary>从备份恢复密钥</summary>
            <textarea id="restore-key" class="restore-input" placeholder="粘贴 base64 编码的主密钥..." rows="2"></textarea>
            <button id="btn-restore" class="btn btn-secondary">恢复</button>
          </details>
        </div>
      </div>
    </section>

    <!-- 会话详情页 -->
    <section id="page-session" class="page">
      <div class="session-header glass">
        <div class="session-header-left">
          <span id="session-dot" class="session-status-dot"></span>
          <h2 id="session-title" class="session-title-text">会话</h2>
        </div>
        <div class="session-header-right">
          <span id="session-mode-badge" class="mode-badge">默认</span>
          <button class="btn-icon" id="btn-stop-session" title="停止会话">&#x23F9;</button>
          <button class="btn-icon" id="btn-session-close" title="关闭">&#x2715;</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area">
        <div class="empty-state">选择一个会话查看消息</div>
      </div>
      <div class="input-area glass" id="input-area">
        <div class="input-row-bottom">
          <input type="text" id="msg-input" class="msg-input" placeholder="输入消息..." disabled>
          <button id="btn-send" class="btn btn-primary btn-send" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- 机器页 -->
    <section id="page-machines" class="page">
      <div class="page-inner">
        <div class="flex-header">
          <h1 class="page-title">机器</h1>
        </div>
        <div id="machine-grid" class="machine-grid">
          <div class="empty-state">暂无已注册机器</div>
        </div>
      </div>
    </section>

    <!-- 统计页 -->
    <section id="page-insights" class="page">
      <div class="page-inner">
        <h1 class="page-title">活动统计</h1>
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card glass"><div class="stat-num" id="stat-sessions">-</div><div class="stat-label">会话数</div></div>
          <div class="stat-card glass"><div class="stat-num" id="stat-messages">-</div><div class="stat-label">消息数</div></div>
          <div class="stat-card glass"><div class="stat-num" id="stat-machines-online">-</div><div class="stat-label">在线</div></div>
          <div class="stat-card glass"><div class="stat-num" id="stat-total-machines">-</div><div class="stat-label">机器总数</div></div>
        </div>
        <div class="stats-breakdown" id="stats-breakdown">
          <div class="empty-state">暂无统计数据</div>
        </div>
      </div>
    </section>

    <!-- 定时任务页 -->
    <section id="page-tasks" class="page">
      <div class="page-inner">
        <h1 class="page-title">定时任务</h1>
        <div id="task-items" class="task-list">
          <div class="empty-state">暂无定时任务</div>
        </div>
      </div>
    </section>

    <!-- 设置页 -->
    <section id="page-settings" class="page">
      <div class="page-inner narrow">
        <h1 class="page-title">设置</h1>
        <div class="settings-card glass">
          <h3>连接</h3>
          <div class="setting-row">
            <label>服务器地址</label>
            <input type="text" id="set-server" class="input-mono" value="/" readonly>
          </div>
          <div class="setting-row">
            <label>访问令牌</label>
            <input type="password" id="set-token" class="input-mono" placeholder="粘贴 Auth Token...">
            <button id="btn-save-token" class="btn btn-secondary">保存</button>
          </div>
          <div class="setting-row">
            <label>主密钥</label>
            <textarea id="set-master-key" class="input-mono" rows="2" placeholder="NaCl 主密钥..."></textarea>
          </div>
        </div>
        <div class="settings-card glass">
          <h3>电路熔断器</h3>
          <pre id="cb-output" class="mono-block">加载中...</pre>
          <button id="btn-reset-cb" class="btn btn-secondary">重置全部</button>
        </div>
      </div>
    </section>
  </main>

  <!-- ─── 新建会话弹窗 ─── -->
  <div id="new-session-modal" class="modal" style="display:none">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass">
      <div class="modal-header">
        <h3>新建会话</h3>
        <button class="btn-icon" onclick="window.closeNewSessionModal()">&#x2715;</button>
      </div>
      <div class="modal-body">
        <label>Agent 类型</label>
        <div class="agent-options">
          <label class="agent-option selected">
            <input type="radio" name="agent-type" value="hermes" checked>
            <span class="agent-name">Hermes</span>
            <span class="agent-desc">通用 AI Agent</span>
          </label>
          <label class="agent-option">
            <input type="radio" name="agent-type" value="claude">
            <span class="agent-name">Claude</span>
            <span class="agent-desc">Anthropic Claude</span>
          </label>
        </div>
        <label for="session-prompt">初始提示</label>
        <textarea id="session-prompt" class="input-mono" rows="3" placeholder="可选：输入初始提示词..."></textarea>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="window.closeNewSessionModal()">取消</button>
          <button class="btn btn-primary" id="btn-create-session">创建</button>
        </div>
      </div>
    </div>
  </div>

  <nav id="mobile-nav" class="mobile-nav">
    <a href="#" data-page="sessions" class="mnav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>会话</span>
    </a>
    <a href="#" data-page="machines" class="mnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>机器</span>
    </a>
    <a href="#" data-page="insights" class="mnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>统计</span>
    </a>
    <a href="#" data-page="pairing" class="mnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>配对</span>
    </a>
    <a href="#" data-page="settings" class="mnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>设置</span>
    </a>
  </nav>

  <!-- ─── Toast 提示 ─── -->
  <div id="toast" class="toast"></div>

  <!-- Socket.IO 本地加载（与后端同源） -->
  <script src="/static/socket.io.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
